spring.profiles.active=prod

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

polar.client-id=${POLAR_CLIENT_ID}
polar.client-secret=${POLAR_CLIENT_SECRET}
polar.auth-uri=https://flow.polar.com/oauth2/authorization
polar.token-uri=https://polarremote.com/v2/oauth2/token
polar.redirect-uri=http://localhost:8080/api/auth/polar/callback

# SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# URLs base
application.form.base-url=http://localhost:5173/training-session/register
application.reset.base-url=http://localhost:5173/reset-password

application.security.jwt.secret-key=${APPLICATION_SECRET_KEY_JWT}
application.security.jwt.token-prefix=Bearer 
# a day in milliseconds
application.security.jwt.expiration=86400000
