spring.profiles.active=prod

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

polar.client-id=${POLAR_CLIENT_ID}
polar.client-secret=${POLAR_CLIENT_SECRET}
polar.auth-uri=https://flow.polar.com/oauth2/authorization
polar.token-uri=https://polarremote.com/v2/oauth2/token
polar.redirect-uri=http://localhost:8080/api/auth/polar/callback

application.security.jwt.secret-key=${APPLICATION_SECRET_KEY_JWT}
application.security.jwt.token-prefix=Bearer 
# a day in milliseconds
application.security.jwt.expiration=86400000