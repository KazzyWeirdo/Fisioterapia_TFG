spring.datasource.url=jdbc:postgresql://localhost:5432/fisio_db
spring.datasource.username=admin
spring.datasource.password=super_secreto_local
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.mongodb.uri=mongodb://admin:super_secreto_local@localhost:27017/fisio_logs?authSource=admin

persistence=dev

# Load seed data on startup (dev only)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true