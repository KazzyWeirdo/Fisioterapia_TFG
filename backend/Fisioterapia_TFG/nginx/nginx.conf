server {
    listen 80;
    server_name fisio-tfg.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fisio-tfg.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/fisio-tfg.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fisio-tfg.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;

    resolver 127.0.0.11 valid=30s;

    location /api/ {
        set $backend http://backend:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        set $frontend http://frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
