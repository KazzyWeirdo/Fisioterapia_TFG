limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

server {
    listen 80;
    server_name fisio-tfg.duckdns.org;
    server_tokens off;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fisio-tfg.duckdns.org;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/fisio-tfg.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fisio-tfg.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    resolver 127.0.0.11 valid=30s;

    location = /api/physiotherapist/login {
        limit_req zone=auth burst=3 nodelay;
        set $backend http://backend:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/password/forgot {
        limit_req zone=auth burst=3 nodelay;
        set $backend http://backend:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        set $backend http://backend:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        set $frontend http://frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
